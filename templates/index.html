{% extends 'base.html' %} {% block title %}Home{% endblock title %} 
{% block body %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="p-3 mb-2 bg-success text-black" style="--bs-bg-opacity: 0.5">
      <div class="text-center">
        <div
          class="btn-group-lg my-4"
          role="group"
          aria-label="Basic mixed styles example"
        >
          <button onclick="voice()" type="button" class="btn btn-danger">
            Speak
          </button>
        </div>

        <div class="container">
          <div class="form-floating my-5">
            <textarea
              class="form-control"
              placeholder="Recognizing text...."
              id="spechtext"
              style="height: 200px"
            ></textarea>
            <label for="textarea">Recognizing text.................. Try to use earphone / microphone for better results.</label>
          </div>
        </div>

        <script>
          function voice() {
            var recognition = new webkitSpeechRecognition();
            recognition.lan = "en-GB";
            recognition.onresult = function (event) {
              console.log(event);
              document.getElementById("spechtext").value =
                event.results[0][0].transcript;
            };
            recognition.start();
          }
        </script>
      </div>
    </div>
    <div
      class="badge bg-dark fs-6 font-monospace text-wrap"
      style="width: 100%"
    >
      <p>
        Press the SPEAK button and start speaking/ saying quotes in Sanskrit and
        wait for a while.
      </p>
      Soon the speech will get converted to text in the given box.
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"
    ></script>
  </body>
</html>

{% endblock body %}
